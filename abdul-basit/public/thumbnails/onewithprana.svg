<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050d16" /><stop offset="100%" stop-color="#0e1c2e" />
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="50%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(4,6,13,0)" /><stop offset="100%" stop-color="rgba(4,6,13,.85)" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,224,255,.12)" /><stop offset="100%" stop-color="rgba(0,224,255,0)" />
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency=".65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="rgba(0,0,0,.02)" filter="url(#noise)"/>
  <circle cx="900" cy="100" r="300" fill="url(#glow)"/>
  <rect width="1200" height="675" fill="url(#overlay)"/>
  <g fill="rgba(0,224,255,.06)" transform="translate(60,60)">
    <circle cx="0" cy="0" r="2"/><circle cx="60" cy="0" r="2"/><circle cx="120" cy="0" r="2"/><circle cx="180" cy="0" r="2"/>
    <circle cx="240" cy="0" r="2"/><circle cx="300" cy="0" r="2"/><circle cx="0" cy="60" r="2"/><circle cx="60" cy="60" r="2"/>
    <circle cx="120" cy="60" r="2"/><circle cx="180" cy="60" r="2"/><circle cx="0" cy="120" r="2"/><circle cx="60" cy="120" r="2"/>
  </g>
  <text x="180" y="520" font-family="'Bebas Neue',sans-serif" font-size="420" fill="rgba(255,255,255,.03)" font-weight="400" letter-spacing="-2">OP</text>
  <rect x="80" y="440" width="140" height="30" rx="15" fill="rgba(0,224,255,.12)" stroke="rgba(0,224,255,.3)" stroke-width="1"/>
  <text x="150" y="460" font-family="'Outfit',sans-serif" font-size="11" fill="#00e0ff" text-anchor="middle" font-weight="600" letter-spacing="2">LOCAL SEO · SCHEMA</text>
  <text x="80" y="500" font-family="'Syne',sans-serif" font-size="28" fill="#edf3ff" font-weight="700" letter-spacing="-.5">One With Prana</text>
</svg>
